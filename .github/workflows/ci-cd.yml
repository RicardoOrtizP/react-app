name: Frontend CI/CD

on:
    push:
        branches: main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 22
            
            - name: Install dependencies
              run: npm ci
            
            # - name: Run lint
            #   run: npm run lint

            - name: Run test
              run: npm run test
            
            - name: Run build
              run: npm run build
    
    docker:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout 
              uses: actions/checkout@v4
              # 1. Autenticacion en Docker Hub
            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            # 2. Generar tag personal con nombre de Bijuu
            - name: Calculate Bijuu Tag
              id: bijuu
              run: |
                # Definir la versión (puedes cambiar esta variable o leerla en un tag/package.json)
                VERSION="1.0.0"
                MAJOR_VERSION=$(echo $VERSION | cut -d. -f1)

                case $MAJOR_VERSION in
                  1) TAIL_NAME="onetail-shukaku" ;;
                  2) TAIL_NAME="twotails-matatabi" ;;
                  3) TAIL_NAME="threetails-isobu" ;;
                  4) TAIL_NAME="fourtails-songoku" ;;
                  5) TAIL_NAME="fivetails-kokuo" ;;
                  6) TAIL_NAME="sixtails-saiken" ;;
                  7) TAIL_NAME="seventails-choumei" ;;
                  8) TAIL_NAME="eighttails-gyuki" ;;
                  9) TAIL_NAME="ninetails-kurama" ;;
                  *) TAIL_NAME="ten-tails" ;;
                esac

                # Guardamos el tag completo (ej: onetail-shukaku-v1.0.0 y onetail-shukaku)
                echo "tag_full=${{ secrets.DOCKER_USERNAME }}/my-react-app:${TAIL_NAME}-v${VERSION}" >> $GITHUB_OUTPUT
                echo "tag_alias=${{ secrets.DOCKER_USERNAME }}/my-react-app:${TAIL_NAME}" >> $GITHUB_OUTPUT
              

            - name: Build amd push Docker Image
              uses: docker/build-push-action@v5
              with: 
                context: .
                push: true
                tags: | 
                  ${{steps.bijuu.outputs.tag_full}}
                  ${{steps.bijuu.outputs.tag_alias}}
            
            - name: Docker Hub Description
              uses: peter-evans/dockerhub-description@v5
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
                repository: ${{ secrets.DOCKER_USERNAME }}/my-react-app
                short-description: "Aplicación de React desplegada con etiquetado temático de Bijuus."
                readme-filepath: ./README-DOCKER.md