name: Frontend CI/CD

on:
    push:
        branches: main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 22
            
            - name: Install dependencies
              run: npm ci
            
            # - name: Run lint
            #   run: npm run lint

            - name: Run test
              run: npm run test
            
            - name: Run build
              run: npm run build
    
    docker:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout 
              uses: actions/checkout@v4

            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build amd push Docker Image
              uses: docker/build-push-action@v5
              with: 
                context: .
                push: true
                tags: ${{secrets.DOCKER_USERNAME}}/my-react-app:${{ github.sha}}
